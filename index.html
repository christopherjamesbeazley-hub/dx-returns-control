<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DX Returns Control</title>
    <link rel="stylesheet" href="/src/styles.css?v=20260709-v111-upload-refresh" />
  </head>
  <body>
    <div id="root">
      <main class="shell">
        <section class="startup-panel">
          <p class="eyebrow">DX Returns Control</p>
          <h1>Loading dashboard</h1>
          <p>If this message stays on screen, the browser could not start the dashboard JavaScript or load the returns dataset.</p>
        </section>
      </main>
    </div>
    <noscript>
      <main class="shell">
        <section class="startup-panel">
          <p class="eyebrow">JavaScript required</p>
          <h1>DX Returns Control needs JavaScript enabled</h1>
          <p>This prototype runs entirely in the browser and needs JavaScript to load the CSV and render the dashboard.</p>
        </section>
      </main>
    </noscript>
    <script>
      window.setTimeout(function () {
        var root = document.getElementById("root");
        if (root && root.textContent.indexOf("Loading dashboard") !== -1) {
          var detail = document.createElement("p");
          detail.className = "startup-hint";
          detail.textContent = "The browser is still waiting for the dashboard module. Check whether JavaScript modules are blocked, then hard-refresh the page.";
          var panel = root.querySelector(".startup-panel");
          if (panel) {
            panel.appendChild(detail);
          }
        }
      }, 5000);
    </script>
    <script type="module">
      import("/src/static-app.js?v=20260709-v111-upload-refresh").catch(function (error) {
        var root = document.getElementById("root");
        var message = error && error.message ? error.message : String(error);
        if (root) {
          root.innerHTML = [
            '<main class="shell">',
            '<section class="startup-panel error">',
            '<p class="eyebrow">Module startup error</p>',
            '<h1>Unable to start dashboard JavaScript</h1>',
            '<p>' + escapeHtml(message) + '</p>',
            '<p>Try a hard refresh. If this remains, open browser developer tools and check the Console for the module error.</p>',
            '</section>',
            '</main>'
          ].join("");
        }
      });

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    </script>
  </body>
</html>
